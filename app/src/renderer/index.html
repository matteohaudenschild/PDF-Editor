<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor</title>
  <link rel="stylesheet" href="./styles.css?v=2026-04-29-updater-1">
</head>
<body>
  <input type="file" id="webPdfInput" accept="application/pdf" hidden>

  <div id="appShell">
    <header id="appHeader">
      <div id="brandBlock" aria-label="PDF Editor">
        <div class="brand-logo" aria-hidden="true">
          <span class="brand-red brand-red-top"></span>
          <span class="brand-word">SICHERHEIT</span>
          <span class="brand-red brand-red-bottom"></span>
          <span class="brand-sub">NORD</span>
        </div>
        <div class="app-title-lockup">
          <h1>PDF Editor</h1>
          <span id="appVersion" aria-label="App-Version"></span>
        </div>
      </div>
      <div id="statusPanel">
        <div id="status">Bereit.</div>
        <div id="meta">Keine PDF geladen.</div>
      </div>
    </header>

    <div id="toolbar" aria-label="Werkzeuge">
      <div class="toolbar-group file-tools">
        <button type="button" id="openButton">PDF laden</button>
      </div>

      <div class="toolbar-group template-tools">
        <button type="button" id="templateLearningButton" hidden>Lernmodus</button>
        <input type="text" id="templateNameInput" placeholder="Vorlagenname" hidden>
        <button type="button" id="saveTemplateButton" hidden>Vorlage speichern</button>
      </div>

      <div class="toolbar-group whiteboard-tools">
        <button type="button" id="whiteboardPenButton">Stift</button>
        <button type="button" id="whiteboardEraserButton">Radierer</button>
        <label id="whiteboardColorLabel" for="whiteboardColorInput">Farbe</label>
        <input type="color" id="whiteboardColorInput" value="#000000" aria-label="Stiftfarbe">
        <label id="whiteboardThicknessLabel" for="whiteboardThicknessInput">Dicke</label>
        <input type="range" id="whiteboardThicknessInput" min="1" max="24" step="1" value="3" aria-label="Stiftdicke">
        <span id="whiteboardThicknessValue">3 px</span>
        <button type="button" id="whiteboardClearButton">Leeren</button>
        <button type="button" id="whiteboardUndoButton" title="Whiteboard: ein Schritt zurück" aria-label="Whiteboard: ein Schritt zurück">&#8592;</button>
        <button type="button" id="whiteboardRedoButton" title="Whiteboard: ein Schritt vor" aria-label="Whiteboard: ein Schritt vor">&#8594;</button>
        <button type="button" id="signatureInsertButton" hidden>Fertig</button>
        <button type="button" id="signatureCancelButton" hidden>Abbrechen</button>
      </div>

      <div class="toolbar-group edit-tools">
        <button type="button" id="selectToolButton">Auswahl</button>
        <button type="button" id="addTextButton">Text</button>
        <button type="button" id="checkButton">Kreuzen</button>
        <button type="button" id="uncheckButton">Leeren</button>
        <button type="button" id="signatureButton">Unterschrift</button>
      </div>

      <div class="toolbar-group undo-tools">
        <button type="button" id="undoButton" title="Schritt zurück" aria-label="Schritt zurück">&#8630;</button>
        <button type="button" id="redoButton" title="Schritt vor" aria-label="Schritt vor">&#8631;</button>
      </div>

      <div class="toolbar-group text-tools">
        <label id="fontFamilyLabel" for="fontFamilySelect">Schrift</label>
        <select id="fontFamilySelect" aria-label="Schriftart">
          <option value="Helvetica">Arial</option>
          <option value="Times-Roman">Times</option>
          <option value="Courier">Courier</option>
        </select>
        <label id="fontSizeLabel" for="fontSizeInput">Größe</label>
        <input type="number" id="fontSizeInput" min="1" max="72" step="0.5" value="8" aria-label="Schriftgröße">
        <button type="button" id="boldButton" class="text-style-toggle" title="Fett" aria-label="Fett" aria-pressed="false">B</button>
        <button type="button" id="italicButton" class="text-style-toggle" title="Kursiv" aria-label="Kursiv" aria-pressed="false">I</button>
        <button type="button" id="underlineButton" class="text-style-toggle" title="Unterstrichen" aria-label="Unterstrichen" aria-pressed="false">U</button>
      </div>

      <div class="toolbar-group page-tools">
        <button type="button" id="prevButton" title="Vorherige Seite" aria-label="Vorherige Seite">&#8592; Vorige</button>
        <button type="button" id="nextButton" title="Nächste Seite" aria-label="Nächste Seite">Nächste &#8594;</button>
      </div>

      <div class="toolbar-group zoom-tools">
        <button type="button" id="zoomOutButton" title="Zoom -">-</button>
        <button type="button" id="zoomFitButton" title="Zoom auf Standard zurücksetzen" aria-label="Zoom auf Standard zurücksetzen">Standard</button>
        <button type="button" id="zoomInButton" title="Zoom +">+</button>
      </div>

      <div class="toolbar-group export-tools">
        <button type="button" id="saveDraftButton" hidden>Entwurf speichern</button>
        <button type="button" id="exportButton">PDF exportieren</button>
        <button type="button" id="revealButton">Export zeigen</button>
      </div>
    </div>

    <div id="updateBanner" hidden>
      <span id="updateMessage"></span>
      <button type="button" id="updateInstallButton">Jetzt installieren</button>
      <button type="button" id="updateDismissButton">Später</button>
    </div>

    <div id="errors"></div>

    <div id="pageArea">
      <div id="whiteboardContainer">
        <canvas id="whiteboardCanvas" aria-label="Whiteboard"></canvas>
        <div id="whiteboardCursor" hidden aria-hidden="true"></div>
      </div>
      <div id="pageContainer" hidden>
        <img id="backgroundImage" alt="" hidden>
        <div id="textLayer"></div>
        <canvas id="signatureCanvas" hidden aria-label="Unterschrift"></canvas>
        <div id="signatureCursor" hidden aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script src="./renderer.js?v=2026-04-29-updater-1"></script>
</body>
</html>
